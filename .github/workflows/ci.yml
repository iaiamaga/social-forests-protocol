name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Soroban Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Instalar Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # PASSO CRÍTICO: Compilar o Leaf Token primeiro
      - name: Build Leaf Token WASM
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/leaf_token/Cargo.toml

      # BUILD DOS NOVOS CONTRATOS MODULARES
      - name: Build collateral_vault WASM
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/collateral_vault/Cargo.toml

      - name: Build guardian_id WASM
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/guardian_id/Cargo.toml

      - name: Build company_id WASM
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/company_id/Cargo.toml

      - name: Build forest_mythos_vault WASM
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/forest_mythos_vault/Cargo.toml

      - name: Build journey_orchestrator WASM
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/journey_orchestrator/Cargo.toml

      # TESTES DOS NOVOS CONTRATOS
      - name: Test leaf_token
        run: cargo test --manifest-path contracts/leaf_token/Cargo.toml -- --nocapture

      - name: Test collateral_vault
        run: cargo test --manifest-path contracts/collateral_vault/Cargo.toml -- --nocapture

      - name: Test guardian_id
        run: cargo test --manifest-path contracts/guardian_id/Cargo.toml -- --nocapture

      - name: Test company_id
        run: cargo test --manifest-path contracts/company_id/Cargo.toml -- --nocapture
        
      - name: Test forest_mythos_vault
        run: cargo test --manifest-path contracts/forest_mythos_vault/Cargo.toml -- --nocapture

      - name: Test journey_orchestrator
        run: cargo test --manifest-path contracts/journey_orchestrator/Cargo.toml -- --nocapture

  frontend:
    name: Next.js Build
    needs: [contracts, secrets-scan]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_X402_PAY_TO: GAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWHF
    steps:
      - uses: actions/checkout@v4.2.2
      
      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
          
      - name: Install Dependencies
        run: cd apps/web && npm ci
        
      - name: Type Check (TypeScript)
        run: cd apps/web && npx tsc --noEmit
        
      - name: Build Web App
        run: cd apps/web && npm run build


  secrets-scan:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
