name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Soroban Tests & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      
      - name: Instalar Rust 1.91.0
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Testes (host target — não precisam de flag --target) ──────────
      - name: Test rwa_vault
        run: cargo test --manifest-path contracts/rwa_vault/Cargo.toml -- --nocapture
        
      - name: Test sbt_reputation
        run: cargo test --manifest-path contracts/sbt_reputation/Cargo.toml -- --nocapture
        
      - name: Test hero_journey
        run: cargo test --manifest-path contracts/hero_journey/Cargo.toml -- --nocapture

      # ── WASM: rwa_vault ────────────
      - name: Build rwa_vault WASM
        run: >
          cargo build
          --target wasm32-unknown-unknown
          --release
          --manifest-path contracts/rwa_vault/Cargo.toml

      # ── WASM: sbt_reputation ─────────────────────────────
      - name: Build sbt_reputation WASM
        run: >
          cargo build
          --target wasm32-unknown-unknown
          --release
          --manifest-path contracts/sbt_reputation/Cargo.toml
          
      - name: Build hero_journey WASM
        run: >
          cargo build
          --target wasm32-unknown-unknown
          --release
          --manifest-path contracts/hero_journey/Cargo.toml

  frontend:
    name: Next.js Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci
      - run: cd apps/web && npx tsc --noEmit
      - run: cd apps/web && npm run build