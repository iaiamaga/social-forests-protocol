name: CI — Social Forest Protocol

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Toda segunda-feira às 06:00 UTC — auditoria de segurança completa
    - cron: '0 6 * * 1'

# Cancela runs anteriores do mesmo PR para economizar minutos de CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# VARIÁVEIS GLOBAIS
# ─────────────────────────────────────────────────────────────────────────────
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Lista canônica de contratos — manter em sync com workspace Cargo.toml
  CONTRACTS: >-
    leaf_token
    collateral_vault
    guardian_id
    company_id
    forest_mythos_vault
    journey_orchestrator

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — SECRET SCANNING (gitleaks)
# Gate mais rápido: bloqueia tudo se houver chave privada exposta
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  secrets-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0          # histórico completo — gitleaks precisa para diff

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — CVE AUDIT (cargo-audit)
# Verifica dependências contra banco de vulnerabilidades RustSec
# Roda em paralelo com secrets-scan — não depende de build
# ─────────────────────────────────────────────────────────────────────────────
  cve-audit:
    name: CVE Audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      # Cache do binário compilado — evita recompilar em cada run (~3 min)
      - name: Cache cargo-audit binary
        id: cache-cargo-audit
        uses: actions/cache@v4.2.2
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-v0.21

      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked --version "^0.21"

      - name: Run cargo audit
        run: cargo audit

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — CONTRACT TESTS
# Roda cargo test em todos os contratos
# Paralelo com CVE audit — não bloqueia o outro
# ─────────────────────────────────────────────────────────────────────────────
  contracts-test:
    name: Contract Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false            # continua testando outros contratos se um falhar
      matrix:
        contract:
          - leaf_token
          - collateral_vault
          - guardian_id
          - company_id
          - forest_mythos_vault
          - journey_orchestrator
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      # Cache separado por contrato — cada matrix cell tem seu próprio cache
      - name: Cache cargo registry
        uses: actions/cache@v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ matrix.contract }}-${{ hashFiles(format('contracts/{0}/Cargo.lock', matrix.contract)) }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-${{ matrix.contract }}-
            ${{ runner.os }}-cargo-test-

      # leaf_token deve ser buildado antes de contratos que o importam
      - name: Pre-build leaf_token WASM (dependency)
        if: matrix.contract != 'leaf_token'
        run: |
          cargo build \
            --target wasm32v1-none \
            --release \
            --manifest-path contracts/leaf_token/Cargo.toml

      - name: Test ${{ matrix.contract }}
        run: |
          cargo test \
            --manifest-path contracts/${{ matrix.contract }}/Cargo.toml \
            -- --nocapture

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — WASM BUILD
# Só roda se todos os testes passarem
# Gera os artefatos WASM e faz upload para uso no deploy
# ─────────────────────────────────────────────────────────────────────────────
  contracts-build:
    name: WASM Build (${{ matrix.contract }})
    runs-on: ubuntu-latest
    needs: contracts-test
    strategy:
      fail-fast: false
      matrix:
        contract:
          - leaf_token
          - collateral_vault
          - guardian_id
          - company_id
          - forest_mythos_vault
          - journey_orchestrator
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ matrix.contract }}-${{ hashFiles(format('contracts/{0}/Cargo.lock', matrix.contract)) }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.contract }}-
            ${{ runner.os }}-cargo-build-

      # Dependência: leaf_token WASM deve existir antes dos outros contratos
      - name: Pre-build leaf_token WASM (dependency)
        if: matrix.contract != 'leaf_token'
        run: |
          cargo build \
            --target wasm32v1-none \
            --release \
            --manifest-path contracts/leaf_token/Cargo.toml

      - name: Build ${{ matrix.contract }} WASM
        run: |
          cargo build \
            --target wasm32v1-none \
            --release \
            --manifest-path contracts/${{ matrix.contract }}/Cargo.toml

      # Upload do artefato WASM — disponível para download e para o job de deploy
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-${{ matrix.contract }}
          path: target/wasm32v1-none/release/*.wasm
          retention-days: 7
          if-no-files-found: error

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — SCOUT SECURITY AUDIT
# Roda após build completo — Scout pode analisar o WASM compilado
# Cobre TODOS os contratos (o original cobria só 3 dos 6)
# ─────────────────────────────────────────────────────────────────────────────
  scout:
    name: Scout Audit (${{ matrix.contract }})
    runs-on: ubuntu-latest
    needs: contracts-build
    strategy:
      fail-fast: false            # audita todos mesmo se um falhar
      matrix:
        contract:
          - leaf_token
          - collateral_vault
          - guardian_id
          - company_id
          - forest_mythos_vault
          - journey_orchestrator
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      # Cache do binário compilado do Scout — evita ~5 min de recompilação
      - name: Cache cargo-scout-audit binary
        id: cache-scout
        uses: actions/cache@v4.2.2
        with:
          path: ~/.cargo/bin/cargo-scout-audit
          key: cargo-scout-${{ runner.os }}-v0.4

      - name: Install cargo-scout-audit
        if: steps.cache-scout.outputs.cache-hit != 'true'
        run: cargo install cargo-scout-audit --locked

      - name: Cache cargo registry (Scout)
        uses: actions/cache@v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-scout-${{ matrix.contract }}-${{ hashFiles(format('contracts/{0}/Cargo.lock', matrix.contract)) }}
          restore-keys: |
            ${{ runner.os }}-cargo-scout-${{ matrix.contract }}-

      # leaf_token WASM necessário como dependência
      - name: Pre-build leaf_token WASM (dependency)
        if: matrix.contract != 'leaf_token'
        run: |
          cargo build \
            --target wasm32v1-none \
            --release \
            --manifest-path contracts/leaf_token/Cargo.toml

      - name: Scout audit — ${{ matrix.contract }}
        run: |
          cargo scout-audit \
            --manifest-path contracts/${{ matrix.contract }}/Cargo.toml

# ─────────────────────────────────────────────────────────────────────────────
# JOB 6 — FRONTEND (Next.js)
# Aguarda contratos E secrets-scan antes de buildar
# Sem as chaves expostas e sem contratos quebrados, o frontend não builda
# ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Next.js Build & Type Check
    runs-on: ubuntu-latest
    needs: [contracts-test, secrets-scan]
    env:
      # Endereço público placeholder — não é segredo
      NEXT_PUBLIC_X402_PAY_TO: GAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWHF
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Node.js 20
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: cd apps/web && npm ci

      - name: TypeScript type check
        run: cd apps/web && npx tsc --noEmit

      - name: Build Next.js
        run: cd apps/web && npm run build

