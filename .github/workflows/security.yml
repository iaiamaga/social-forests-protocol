name: Security & Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # toda segunda-feira — detecta novas CVEs upstream

jobs:
  test:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.88'
          targets: wasm32-unknown-unknown,wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Test rwa_vault
        run: cargo test --manifest-path contracts/rwa_vault/Cargo.toml -- --nocapture

      - name: Test sbt_reputation
        run: cargo test --manifest-path contracts/sbt_reputation/Cargo.toml -- --nocapture

      - name: Test hero_journey
        run: cargo test --manifest-path contracts/hero_journey/Cargo.toml -- --nocapture

  build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.88'
          targets: wasm32-unknown-unknown,wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      # rwa_vault usa SDK 22 → wasm32-unknown-unknown
      - name: Build rwa_vault (WASM)
        run: >
          cargo build --target wasm32-unknown-unknown --release
          --manifest-path contracts/rwa_vault/Cargo.toml

      # SDK 25 exige wasm32v1-none
      - name: Build sbt_reputation (WASM)
        run: >
          cargo build --target wasm32v1-none --release
          --manifest-path contracts/sbt_reputation/Cargo.toml

      - name: Build hero_journey (WASM)
        run: >
          cargo build --target wasm32v1-none --release
          --manifest-path contracts/hero_journey/Cargo.toml

  audit:
    name: Rust CVE Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.88'

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      - name: Audit dependencies
        # .cargo/audit.toml ignora advisories não-acionáveis (soroban internals)
        run: cargo audit

  scout:
    name: Scout Security Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Instalar Rust 1.91.0
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0
          targets: wasm32-unknown-unknown

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.88'

      - name: Install Scout
        run: cargo install cargo-scout-audit

      - name: Audit rwa_vault
        run: cargo scout-audit --manifest-path contracts/rwa_vault/Cargo.toml

      - name: Audit sbt_reputation
        run: cargo scout-audit --manifest-path contracts/sbt_reputation/Cargo.toml

      - name: Audit hero_journey
        run: cargo scout-audit --manifest-path contracts/hero_journey/Cargo.toml
